  <body>
    <noscript>
      <h1>DaFit Canvas</h1>
      <p>
        DaFit Canvas is a browser-based visual editor for designing
        smartwatch faces compatible with the Da Fit / MoYoung ecosystem.
        Import an existing Type C <code>.bin</code>, swap assets, retouch
        positions, regenerate digits from a font, and export a watch-ready
        binary — without ever touching a hex editor.
      </p>
      <p>
        This application requires JavaScript to run. Please enable
        JavaScript in your browser. Source code and documentation are
        available at
        <a href="https://github.com/e-labInnovations/DaFit-Canvas">
          github.com/e-labInnovations/DaFit-Canvas
